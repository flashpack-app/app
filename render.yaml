services:
  - type: web
    name: flashpack-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flashpack-db
          property: connectionString
      - key: NODE_ENV
        value: production
      # Shared cache across instances — set in the Render dashboard
      # (e.g. a Render Key Value instance's connection string).
      # Leave unset to run with the in-process fallback cache.
      - key: REDIS_URL
        sync: false
    healthCheckPath: /health

databases:
  - name: flashpack-db
    plan: starter
    databaseName: flashpack
    user: flashpack
