services:
  - type: web
    name: flashpack-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flashpack-db
          property: connectionString
      - key: NODE_ENV
        value: production
    healthCheckPath: /health

databases:
  - name: flashpack-db
    plan: starter
    databaseName: flashpack
    user: flashpack
